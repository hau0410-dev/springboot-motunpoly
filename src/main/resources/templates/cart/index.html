<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<link rel="stylesheet" th:href="@{/css/cart.css}">
<link rel="stylesheet" href="/css/style.css">
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    
</head>
<body>
<div th:replace="layout/header :: header"></div>
<div class="cart-container">

    <h2 class="cart-title">🛒 Giỏ hàng của bạn</h2>
	
	<div th:if="${session.stockMessage}"
	     class="stock-alert">
	
	    <span th:text="${session.stockMessage}"></span>
	
	</div>
    <div th:if="${cart == null || cart.empty}" class="cart-empty">
        Giỏ hàng đang trống.
    </div>

    <div class="cart-table-wrap" th:if="${cart != null && !cart.empty}">
    <table class="cart-table">
        <thead>
        <tr>
            <th>Sản phẩm</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Tồn Kho</th>
            <th>Thành tiền</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="item : ${cart.items}">
            <td class="product-cell">
                <img th:src="@{/imges/{img}(img=${item.image})}" class="product-thumb">
                <div th:text="${item.productName}"></div>
            </td>

            <td class="price"
                th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + 'đ'"></td>

            <td>
                <div class="qty-control">

                    <!-- GIẢM -->
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post">
                        <input type="hidden" name="qty" th:value="${item.quantity - 1}">
                        <button type="submit" class="btn-qty"
                                th:disabled="${item.quantity <= 1}">−</button>
                    </form>

                    <!-- NHẬP SỐ LƯỢNG -->
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post">
                        <input type="number" name="qty" class="qty-input"
                               th:value="${item.quantity}"
                               min="1" th:max="${item.stock}"
                               onchange="this.form.submit()">
                    </form>

                    <!-- TĂNG -->
                    <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post">
                        <input type="hidden" name="qty" th:value="${item.quantity + 1}">
                        <button type="submit" class="btn-qty"
                                th:disabled="${item.quantity >= item.stock}">+</button>
                    </form>

                </div>
            </td>

            <td th:text="${item.stock}"></td>

            <td class="price"
                th:text="${#numbers.formatDecimal(item.totalPrice,0,'COMMA',0,'POINT')} + 'đ'"></td>

            <td>
                <a class="btn-remove"
                   th:href="@{/cart/remove/{id}(id=${item.productId})}">
                    ❌ Xóa
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    </div>

    <div th:if="${cart != null && !cart.empty}"
         class="cart-total">
        Tổng tiền:
        <span th:text="${#numbers.formatDecimal(cart.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></span>
    </div>
    <div th:if="${cart != null && !cart.empty}" class="cart-actions">
    <a class="btn-checkout" th:href="@{/cart/checkout}">
        🧾 Tiến hành thanh toán
    </a>
</div>
    

</div>
