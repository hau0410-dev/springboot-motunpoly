<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng — MotunPoly</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/cart.css}">
</head>
<body>
<div th:replace="layout/header :: header"></div>

<div class="cart-page-wrap">

    <h2 class="cart-title">Giỏ hàng</h2>

    <div th:if="${session.stockMessage}" class="stock-alert">
        <span th:text="${session.stockMessage}"></span>
    </div>

    <div th:if="${cart == null || cart.empty}" class="cart-empty">
        🛒 Giỏ hàng trống. <a th:href="@{/}" style="color:#111;font-weight:700;">Tiếp tục mua sắm →</a>
    </div>

    <div class="cart-layout" th:if="${cart != null && !cart.empty}">

        <!-- TABLE -->
        <div class="cart-table-card">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th style="text-align:left;">Sản phẩm</th>
                        <th>Đơn giá</th>
                        <th>Số lượng</th>
                        <th>Tồn kho</th>
                        <th>Thành tiền</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${cart.items}">
                        <td class="product-cell">
                            <img th:src="@{/imges/{img}(img=${item.image})}" class="product-thumb">
                            <div th:text="${item.productName}"></div>
                        </td>
                        <td class="price" th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + 'đ'"></td>
                        <td>
                            <div class="qty-control">
                                <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post">
                                    <input type="hidden" name="qty" th:value="${item.quantity - 1}">
                                    <button type="submit" class="btn-qty" th:disabled="${item.quantity <= 1}">−</button>
                                </form>
                                <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post">
                                    <input type="number" name="qty" class="qty-input"
                                           th:value="${item.quantity}" min="1" th:max="${item.stock}"
                                           onchange="this.form.submit()">
                                </form>
                                <form th:action="@{/cart/update/{id}(id=${item.productId})}" method="post">
                                    <input type="hidden" name="qty" th:value="${item.quantity + 1}">
                                    <button type="submit" class="btn-qty" th:disabled="${item.quantity >= item.stock}">+</button>
                                </form>
                            </div>
                        </td>
                        <td th:text="${item.stock}"></td>
                        <td class="price" th:text="${#numbers.formatDecimal(item.totalPrice,0,'COMMA',0,'POINT')} + 'đ'"></td>
                        <td>
                            <a class="btn-remove" th:href="@{/cart/remove/{id}(id=${item.productId})}">Xoá</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- ORDER SUMMARY -->
        <div class="order-summary">
            <div class="order-summary-title">Đơn hàng</div>
            <div class="summary-row">
                <span>Tạm tính</span>
                <span th:text="${#numbers.formatDecimal(cart.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></span>
            </div>
            <div class="summary-row">
                <span>Vận chuyển</span>
                <span style="color:#16a34a;font-weight:700;">Miễn phí</span>
            </div>
            <div class="summary-total">
                <span>Tổng cộng</span>
                <span th:text="${#numbers.formatDecimal(cart.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></span>
            </div>
            <a th:href="@{/cart/checkout}" class="btn-checkout">Tiến hành thanh toán →</a>
        </div>

    </div>

</div>

<div th:replace="layout/footer"></div>
</body>
</html>
