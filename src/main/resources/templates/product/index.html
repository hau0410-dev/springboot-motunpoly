<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Product Form</title>
<link rel="stylesheet" th:href="@{/css/admin-product-form.css}">
<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
<div th:replace="admin/layout/header :: header"></div>
<h2>FORM SẢN PHẨM</h2>

<form th:action="@{/admin/products/save}"
      th:object="${product}"
      method="post"
      enctype="multipart/form-data">

<input type="hidden" th:field="*{id}"/>

<div class="form-group">
    <label>Name</label>
    <input type="text" th:field="*{name}">
</div>

<div class="form-group">
    <label>Price</label>
    <input type="text" th:field="*{price}">
</div>

<div class="form-group">
    <label>Tồn kho</label>
    <input type="number"
           min="0"
           th:field="*{stock}">
</div>

<div class="form-group">
    <label>Image</label>
    <input type="file" name="imageFile">
</div>

<div class="form-group">
    <label>Category</label>
    <select th:field="*{category.id}">
        <option value="">-- Chọn danh mục --</option>
        <option th:each="c : ${categories}"
                th:value="${c.id}"
                th:text="${c.name}">
        </option>
    </select>
</div>

<div class="form-group description">
    <label>Description</label>
    <textarea th:field="*{description}"></textarea>
</div>

<hr>

<div class="actions">

    <button type="submit">💾 Lưu</button>

    <a th:if="${product.id != null}"
       th:href="@{|/admin/products/delete/${product.id}|}"
       onclick="return confirm('Xoá sản phẩm này khỏi database?')"
       class="delete">
        ❌ Xoá
    </a>

    <a th:href="@{/admin/products}" class="back">
        ⬅ Quay lại
    </a>

</div>

</form>

</body>
</html>
