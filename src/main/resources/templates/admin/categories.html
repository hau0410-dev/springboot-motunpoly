<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="content">
        <div th:replace="admin/layout/header :: header"></div>
        <div class="content-body">

            <h2 class="page-title">📁 Quản lý danh mục</h2>

            <div style="display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start;">

                <div class="card">
                    <h3 style="margin:0 0 18px;font-size:15px;border-left:4px solid #f59e0b;padding-left:10px;">
                        <span th:text="${category.id != null} ? '✏️ Cập nhật' : '➕ Thêm danh mục'">Thêm</span>
                    </h3>
                    <form th:action="@{/admin/categories/save}" method="post">
                        <input type="hidden" name="id" th:value="${category.id}">
                        <div class="form-group">
                            <label>Tên danh mục</label>
                            <input type="text" name="name" th:value="${category.name}" required>
                        </div>
                        <div class="form-group">
                            <label>Icon (emoji)</label>
                            <input type="text" name="icon" th:value="${category.icon}" placeholder="VD: 🔧">
                        </div>
                        <div class="form-group">
                            <label>Trạng thái</label>
                            <select name="isActive">
                                <option value="true" th:selected="${category.isActive == true}">✅ Hoạt động</option>
                                <option value="false" th:selected="${category.isActive == false}">🔒 Tắt</option>
                            </select>
                        </div>
                        <div style="display:flex;gap:10px;">
                            <button type="submit" class="btn btn-primary" style="flex:1;">💾 Lưu</button>
                            <a th:href="@{/admin/categories}" class="btn btn-secondary">➕ Mới</a>
                        </div>
                    </form>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>ID</th><th>Icon</th><th>Tên danh mục</th><th>Trạng thái</th><th>Thao tác</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${categories}">
                                <td th:text="${c.id}"></td>
                                <td style="font-size:20px;" th:text="${c.icon ?: '🔧'}"></td>
                                <td><a th:href="@{'/admin/categories/edit/' + ${c.id}}" style="color:#d97706;font-weight:700;" th:text="${c.name}"></a></td>
                                <td>
                                    <span th:if="${c.isActive}" class="badge badge-success">✅ Hoạt động</span>
                                    <span th:unless="${c.isActive}" class="badge badge-muted">🔒 Tắt</span>
                                </td>
                                <td>
                                    <a th:href="@{'/admin/categories/edit/' + ${c.id}}" class="btn btn-sm btn-secondary">✏️</a>
                                    <a th:href="@{'/admin/categories/delete/' + ${c.id}}" onclick="return confirm('Xoá danh mục?')" class="btn btn-sm btn-danger">🗑️</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
