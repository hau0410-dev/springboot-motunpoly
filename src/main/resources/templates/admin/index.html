<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="content">
        <div th:replace="admin/layout/header :: header"></div>
        <div class="content-body">

            <h2 class="page-title">🏠 Dashboard</h2>

            <div class="stat-grid">
                <div class="stat-box">
                    <div class="stat-num" th:text="${totalProducts ?: 0}">0</div>
                    <div class="stat-label">🛒 Sản phẩm</div>
                </div>
                <div class="stat-box" style="border-top-color:#0ea5e9">
                    <div class="stat-num" th:text="${totalOrders ?: 0}">0</div>
                    <div class="stat-label">📦 Đơn hàng</div>
                </div>
                <div class="stat-box" style="border-top-color:#16a34a">
                    <div class="stat-num" th:text="${totalUsers ?: 0}">0</div>
                    <div class="stat-label">👤 Người dùng</div>
                </div>
                <div class="stat-box" style="border-top-color:#dc2626">
                    <div class="stat-num" th:text="${totalRevenue != null ? #numbers.formatDecimal(totalRevenue,0,'COMMA',0,'POINT') + 'đ' : '0đ'}">0đ</div>
                    <div class="stat-label">💰 Doanh thu</div>
                </div>
            </div>

            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
                <a th:href="@{/admin/products}" class="card" style="text-decoration:none;text-align:center;cursor:pointer;transition:.15s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                    <div style="font-size:36px;margin-bottom:8px;">🛒</div>
                    <div style="font-weight:700;color:#222;">Quản lý sản phẩm</div>
                    <div style="font-size:13px;color:#888;margin-top:4px;">Thêm, sửa, xoá sản phẩm</div>
                </a>
                <a th:href="@{/admin/orders}" class="card" style="text-decoration:none;text-align:center;cursor:pointer;transition:.15s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                    <div style="font-size:36px;margin-bottom:8px;">📦</div>
                    <div style="font-weight:700;color:#222;">Quản lý đơn hàng</div>
                    <div style="font-size:13px;color:#888;margin-top:4px;">Xác nhận & theo dõi đơn</div>
                </a>
                <a th:href="@{/admin/users}" class="card" style="text-decoration:none;text-align:center;cursor:pointer;transition:.15s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                    <div style="font-size:36px;margin-bottom:8px;">👤</div>
                    <div style="font-weight:700;color:#222;">Quản lý người dùng</div>
                    <div style="font-size:13px;color:#888;margin-top:4px;">Phân quyền, khoá tài khoản</div>
                </a>
                <a th:href="@{/admin/promotions}" class="card" style="text-decoration:none;text-align:center;cursor:pointer;transition:.15s;" onmouseover="this.style.transform='translateY(-3px)'" onmouseout="this.style.transform=''">
                    <div style="font-size:36px;margin-bottom:8px;">🎁</div>
                    <div style="font-weight:700;color:#222;">Khuyến mãi</div>
                    <div style="font-size:13px;color:#888;margin-top:4px;">Chương trình ưu đãi</div>
                </a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
