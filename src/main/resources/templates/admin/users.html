<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý người dùng</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="content">
        <div th:replace="admin/layout/header :: header"></div>
        <div class="content-body">

            <h2 class="page-title">👤 Quản lý người dùng</h2>

            <div style="display:grid;grid-template-columns:320px 1fr;gap:22px;align-items:start;">

                <!-- FORM -->
                <div class="card">
                    <h3 style="margin:0 0 18px;font-size:15px;border-left:4px solid #f59e0b;padding-left:10px;">
                        <span th:text="${user.id != null} ? '✏️ Cập nhật' : '➕ Thêm người dùng'">Thêm</span>
                    </h3>

                    <form th:action="@{/admin/users/save}" th:object="${user}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" th:field="*{username}" required>
                        </div>
                        <div class="form-group">
                            <label>Mật khẩu</label>
                            <input type="password" th:field="*{password}">
                        </div>
                        <div class="form-group">
                            <label>Họ tên</label>
                            <input type="text" th:field="*{fullName}">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" th:field="*{email}">
                        </div>
                        <div class="form-group">
                            <label>Role</label>
                            <select th:field="*{role}">
                                <option value="USER">USER</option>
                                <option value="ADMIN">ADMIN</option>
                                <option value="SHIPPER">SHIPPER</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Trạng thái</label>
                            <select th:field="*{enabled}">
                                <option th:value="true">✅ Hoạt động</option>
                                <option th:value="false">🔒 Khoá</option>
                            </select>
                        </div>

                        <div style="display:flex;gap:10px;margin-top:6px;">
                            <button type="submit" class="btn btn-primary" style="flex:1;">💾 Lưu</button>
                            <a th:href="@{/admin/users}" class="btn btn-secondary">➕ Mới</a>
                        </div>
                    </form>
                </div>

                <!-- TABLE -->
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Họ tên</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}"></td>
                                <td><a th:href="@{/admin/users/edit/{id}(id=${u.id})}" style="color:#d97706;font-weight:700;" th:text="${u.username}"></a></td>
                                <td th:text="${u.fullName}"></td>
                                <td th:text="${u.email}"></td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${u.role == 'ADMIN'} ? 'badge-danger' : (${u.role == 'SHIPPER'} ? 'badge-info' : 'badge-muted')"
                                        th:text="${u.role}"></span>
                                </td>
                                <td>
                                    <span th:if="${u.enabled}" class="badge badge-success">✅ Hoạt động</span>
                                    <span th:unless="${u.enabled}" class="badge badge-danger">🔒 Khoá</span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/users/edit/{id}(id=${u.id})}" class="btn btn-sm btn-secondary">✏️</a>
                                    <a th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                                       onclick="return confirm('Xoá người dùng này?')"
                                       class="btn btn-sm btn-danger">🗑️</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</div>
</body>
</html>
