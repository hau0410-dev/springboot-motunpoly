<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đánh giá</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="content">
        <div th:replace="admin/layout/header :: header"></div>
        <div class="content-body">

            <h2 class="page-title">⭐ Quản lý đánh giá</h2>

            <div class="card">
                <form action="/admin/reviews" method="get" class="filter-bar">
                    <input type="text" name="user" placeholder="🔍 Tìm user" th:value="${param.user}">
                    <input type="text" name="product" placeholder="🔍 Tìm sản phẩm" th:value="${param.product}">
                    <button type="submit" class="btn btn-primary">Tìm kiếm</button>
                </form>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Khách hàng</th>
                            <th>Email</th>
                            <th>Sản phẩm</th>
                            <th>Đánh giá</th>
                            <th>Nhận xét</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${reviews}">
                            <td th:text="${r.id}"></td>
                            <td><b th:text="${r.fullname}"></b></td>
                            <td th:text="${r.email}"></td>
                            <td th:text="${r.productName}"></td>
                            <td style="color:#f59e0b;font-size:16px;letter-spacing:2px;">
                                <span th:each="i : ${#numbers.sequence(1,r.rating)}">★</span>
                                <span th:each="i : ${#numbers.sequence(r.rating+1,5)}" style="color:#ddd;">★</span>
                            </td>
                            <td th:text="${r.comment}" style="max-width:200px;text-align:left;"></td>
                            <td>
                                <form th:action="@{/admin/reviews/delete/{id}(id=${r.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                            onclick="return confirm('Xoá đánh giá này?')">🗑️ Xoá</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
</body>
</html>
