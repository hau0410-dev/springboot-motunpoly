<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Quản lý tồn kho</title>

<link rel="stylesheet"
      th:href="@{/css/admin-inventory.css}">
      <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>

<div th:replace="admin/layout/header :: header"></div>

<div class="admin-container">

    <div th:replace="admin/layout/sidebar :: sidebar"></div>

    <main class="content">

        <h2>📦 Quản lý tồn kho phụ tùng</h2>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Tên phụ tùng</th>
                <th>Giá</th>
                <th>Tồn kho</th>
                <th>Lưu</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="p : ${products}">

                <td th:text="${p.id}"></td>

                <td th:text="${p.name}"></td>

                <td>
                    <span th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')}"></span>
                    đ
                </td>

                <td>

                    <form th:action="@{/admin/inventory/update}"
                          method="post">

                        <input type="hidden"
                               name="id"
                               th:value="${p.id}">

                        <input type="number"
                               min="0"
                               name="stock"
                               th:value="${p.stock}">
                </td>

                <td>

                        <button type="submit">
                            💾 Cập nhật
                        </button>

                    </form>

                </td>

            </tr>

            </tbody>

        </table>

    </main>

</div>

</body>
</html>
