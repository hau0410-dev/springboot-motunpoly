<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="content">
        <div th:replace="admin/layout/header :: header"></div>
        <div class="content-body">

            <h2 class="page-title">📦 Lịch sử đặt hàng</h2>

            <div class="card">
                <form method="get" action="/admin/orders" class="filter-bar">
                    <input type="text" name="name" placeholder="🔍 Tìm khách hàng" th:value="${name}">
                    <select name="status">
                        <option value="" th:selected="${status == null or status == ''}">Tất cả trạng thái</option>
                        <option value="CHO_XAC_NHAN" th:selected="${status == 'CHO_XAC_NHAN'}">⏳ Chờ xác nhận</option>
                        <option value="CHO_LAY_HANG" th:selected="${status == 'CHO_LAY_HANG'}">📦 Chờ lấy hàng</option>
                        <option value="DANG_GIAO" th:selected="${status == 'DANG_GIAO'}">🚚 Đang giao</option>
                        <option value="DA_GIAO" th:selected="${status == 'DA_GIAO'}">📬 Chờ khách xác nhận</option>
                        <option value="HOAN_THANH" th:selected="${status == 'HOAN_THANH'}">✅ Hoàn thành</option>
                        <option value="KHIEU_NAI" th:selected="${status == 'KHIEU_NAI'}">🚨 Đơn rủi ro</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Lọc</button>
                </form>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Khách hàng</th>
                            <th>SĐT</th>
                            <th>Tổng tiền</th>
                            <th>TT Thanh toán</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o : ${orders}">
                            <td><b th:text="'#' + ${o.id}"></b></td>
                            <td style="text-align:left;">
                                <div style="font-weight:600;" th:text="${o.fullname}"></div>
                                <div style="font-size:12px;color:#888;" th:text="${o.email}"></div>
                            </td>
                            <td th:text="${o.phone}"></td>
                            <td style="color:#d97706;font-weight:700;"
                                th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></td>
                            <td>
                                <span th:if="${o.payment != null and o.payment.paymentMethod == 'COD' and o.payment.paymentStatus == 'CHO_THANH_TOAN'}" class="badge badge-pending">💵 Chưa TT (COD)</span>
                                <span th:if="${o.payment != null and o.payment.paymentMethod == 'COD' and (o.payment.paymentStatus == 'THANH_CONG' or o.payment.paymentStatus == 'DA_THANH_TOAN')}" class="badge badge-success">✅ Đã thu COD</span>
                                <span th:if="${o.payment != null and o.payment.paymentMethod == 'BANKING' and (o.payment.paymentStatus == 'CHO_THANH_TOAN' or o.payment.paymentStatus == 'CHO_XAC_NHAN')}" class="badge badge-info">🏦 Chờ CK</span>
                                <span th:if="${o.payment != null and o.payment.paymentMethod == 'BANKING' and (o.payment.paymentStatus == 'THANH_CONG' or o.payment.paymentStatus == 'DA_THANH_TOAN')}" class="badge badge-success">✅ Đã CK</span>
                                <span th:if="${o.payment == null}" class="badge badge-muted">—</span>
                            </td>
                            <td>
                                <span th:if="${o.status == 'CHO_XAC_NHAN'}" class="badge badge-pending">⏳ Chờ xác nhận</span>
                                <span th:if="${o.status == 'CHO_LAY_HANG'}" class="badge badge-wait">📦 Chờ lấy hàng</span>
                                <span th:if="${o.status == 'DANG_GIAO'}" class="badge badge-info">🚚 Đang giao</span>
                                <span th:if="${o.status == 'DA_GIAO'}" class="badge badge-wait-xn">📬 Chờ KH xác nhận</span>
                                <span th:if="${o.status == 'HOAN_THANH'}" class="badge badge-success">✅ Hoàn thành</span>
                                <span th:if="${o.status == 'KHIEU_NAI'}" class="badge badge-danger">🚨 Đơn rủi ro</span>
                            </td>
                            <td>
                                <a th:if="${o.status == 'CHO_XAC_NHAN'}"
                                   th:href="@{/admin/orders/update/{id}(id=${o.id})}"
                                   class="btn btn-sm btn-primary">✅ Xác nhận</a>
                                <a th:if="${o.status == 'KHIEU_NAI'}"
                                   th:href="@{/admin/orders/resolve/{id}(id=${o.id})}"
                                   class="btn btn-sm btn-primary">🔁 Xử lý</a>
                                <a th:href="@{/admin/orders/{id}(id=${o.id})}" class="btn btn-sm btn-secondary">👁 Xem</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
</body>
</html>
