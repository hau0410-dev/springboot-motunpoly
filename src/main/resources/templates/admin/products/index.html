<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<div class="admin-container">
    <div th:replace="admin/layout/sidebar :: sidebar"></div>
    <div class="content">
        <div th:replace="admin/layout/header :: header"></div>
        <div class="content-body">

            <h2 class="page-title">🛒 Quản lý sản phẩm</h2>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px;">
                <a th:href="@{/admin/products/create}" class="btn btn-primary">➕ Thêm sản phẩm</a>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hình</th>
                            <th>Tên sản phẩm</th>
                            <th>Giá</th>
                            <th>Hãng xe</th>
                            <th>Loại xe</th>
                            <th>Hãng PT</th>
                            <th>Tồn kho</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${products}">
                            <td th:text="${p.id}"></td>
                            <td>
                                <img th:src="@{'/imges/' + ${p.image}}"
                                     style="width:52px;height:52px;object-fit:contain;border-radius:8px;border:1px solid #eee;background:#fff;">
                            </td>
                            <td style="text-align:left;font-weight:600;max-width:200px;" th:text="${p.name}"></td>
                            <td style="color:#d97706;font-weight:700;"
                                th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + 'đ'"></td>
                            <td>
                                <span th:if="${p.brand != null && !p.brand.isEmpty()}"
                                      class="badge badge-info" th:text="${p.brand}"></span>
                                <span th:unless="${p.brand != null && !p.brand.isEmpty()}"
                                      style="color:#ccc;font-size:12px;">—</span>
                            </td>
                            <td>
                                <span th:if="${p.vehicleType != null && !p.vehicleType.isEmpty()}"
                                      class="badge badge-muted" th:text="${p.vehicleType}"></span>
                                <span th:unless="${p.vehicleType != null && !p.vehicleType.isEmpty()}"
                                      style="color:#ccc;font-size:12px;">—</span>
                            </td>
                            <td>
                                <span th:if="${p.partsBrand != null && !p.partsBrand.isEmpty()}"
                                      class="badge badge-pending" th:text="${p.partsBrand}"></span>
                                <span th:unless="${p.partsBrand != null && !p.partsBrand.isEmpty()}"
                                      style="color:#ccc;font-size:12px;">—</span>
                            </td>
                            <td>
                                <span th:if="${p.stock > 10}" class="badge badge-success" th:text="${p.stock}"></span>
                                <span th:if="${p.stock > 0 and p.stock <= 10}" class="badge badge-wait-xn" th:text="${p.stock}"></span>
                                <span th:if="${p.stock <= 0}" class="badge badge-danger">Hết</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-secondary">✏️ Sửa</a>
                                <a th:href="@{/admin/products/delete/{id}(id=${p.id})}"
                                   onclick="return confirm('Xoá sản phẩm này?')"
                                   class="btn btn-sm btn-danger">🗑️</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
</body>
</html>
