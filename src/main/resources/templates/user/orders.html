<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Lịch sử đặt hàng — MotunPoly</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/user-pages.css}">
</head>
<body>
<div th:replace="layout/header :: header"></div>

<div class="user-page-wrap">

    <h2 class="user-page-title">Lịch sử đặt hàng</h2>

    <div class="user-empty" th:if="${orders == null || orders.isEmpty()}">
        Bạn chưa có đơn hàng nào.
        <a th:href="@{/}" class="user-empty-link">Tiếp tục mua sắm →</a>
    </div>

    <div class="user-table-wrap" th:if="${orders != null && !orders.isEmpty()}">
        <table class="user-table">
            <thead>
                <tr>
                    <th>Mã ĐH</th>
                    <th>Sản phẩm</th>
                    <th>Tổng tiền</th>
                    <th>Thanh toán</th>
                    <th>TT Thanh toán</th>
                    <th>Trạng thái</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="o : ${orders}">
                    <td><b th:text="'#' + ${o.id}"></b></td>
                    <td th:text="${o.fullname}" style="color:#888;font-size:13px;"></td>
                    <td class="u-price" th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></td>
                    <td style="font-size:13px;" th:text="${o.payment != null ? o.payment.paymentMethod : '—'}"></td>
                    <td>
                        <span th:if="${o.payment != null and o.payment.paymentStatus == 'DA_THANH_TOAN'}" class="u-badge u-badge-ok">✅ Đã TT</span>
                        <span th:if="${o.payment != null and o.payment.paymentStatus == 'CHO_THANH_TOAN'}" class="u-badge u-badge-wait">⏳ Chờ TT</span>
                        <span th:if="${o.payment != null and o.payment.paymentStatus == 'CHO_XAC_NHAN'}" class="u-badge u-badge-info">🏦 Chờ XN</span>
                        <span th:if="${o.payment == null}" class="u-badge u-badge-muted">—</span>
                    </td>
                    <td>
                        <span th:if="${o.status == 'CHO_XAC_NHAN'}" class="u-badge u-badge-wait">⏳ Chờ xác nhận</span>
                        <span th:if="${o.status == 'CHO_LAY_HANG'}" class="u-badge u-badge-info">📦 Chờ lấy hàng</span>
                        <span th:if="${o.status == 'DANG_GIAO'}" class="u-badge u-badge-info">🚚 Đang giao</span>
                        <span th:if="${o.status == 'DA_GIAO'}" class="u-badge u-badge-wait">📬 Chờ xác nhận</span>
                        <span th:if="${o.status == 'HOAN_THANH'}" class="u-badge u-badge-ok">✅ Hoàn thành</span>
                        <span th:if="${o.status == 'KHIEU_NAI'}" class="u-badge u-badge-danger">🚨 Rủi ro</span>
                    </td>
                    <td>
                        <a th:href="@{/orders/{id}(id=${o.id})}" class="u-btn">Xem →</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<div th:replace="layout/footer"></div>
</body>
</html>
