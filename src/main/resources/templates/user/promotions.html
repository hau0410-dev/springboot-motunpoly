<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Ưu đãi của tôi — MotunPoly</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
<link rel="stylesheet" th:href="@{/css/user-pages.css}">
</head>
<body>
<div th:replace="layout/header :: header"></div>

<div class="user-page-wrap">

    <h2 class="user-page-title">Ưu đãi của tôi</h2>

    <!-- TỔNG CHI TIÊU -->
    <div class="promo-spent-card">
        <div class="promo-spent-label">Tổng đơn hàng hoàn thành</div>
        <div class="promo-spent-value" th:text="${#numbers.formatDecimal(totalSpent,0,'COMMA',0,'POINT')} + 'đ'">0đ</div>
        <div class="promo-spent-note">Mua sắm nhiều hơn để mở khoá ưu đãi riêng dành cho bạn</div>
    </div>

    <div class="user-empty" th:if="${promotions == null || promotions.isEmpty()}">
        Hiện chưa có chương trình khuyến mãi nào.
    </div>

    <div class="promo-grid" th:if="${promotions != null && !promotions.isEmpty()}">
        <div class="promo-card-user"
             th:each="p : ${promotions}"
             th:classappend="${(p.minTotalSpent == null ? 0 : p.minTotalSpent) <= totalSpent} ? 'unlocked' : 'locked'">

            <div class="pcu-head">
                <span class="pcu-icon" th:text="${p.icon ?: '🎁'}"></span>
                <div>
                    <div class="pcu-title" th:text="${p.title}"></div>
                    <span class="pcu-badge" th:text="${p.badgeText}"></span>
                </div>
                <div class="pcu-lock" th:if="${(p.minTotalSpent == null ? 0 : p.minTotalSpent) > totalSpent}">🔒</div>
                <div class="pcu-check" th:if="${(p.minTotalSpent == null ? 0 : p.minTotalSpent) <= totalSpent}">✓</div>
            </div>

            <p class="pcu-desc" th:text="${p.description}"></p>

            <div class="pcu-condition">
                Điều kiện: từ <b th:text="${#numbers.formatDecimal(p.minTotalSpent,0,'COMMA',0,'POINT')} + 'đ'"></b>
            </div>

            <div class="pcu-status ok" th:if="${(p.minTotalSpent == null ? 0 : p.minTotalSpent) <= totalSpent}">
                Đã mở khoá
            </div>
            <div class="pcu-status locked" th:if="${(p.minTotalSpent == null ? 0 : p.minTotalSpent) > totalSpent}">
                Mua thêm <b th:text="${#numbers.formatDecimal(p.minTotalSpent - totalSpent,0,'COMMA',0,'POINT')} + 'đ'"></b> nữa
            </div>

            <div class="pcu-products" th:if="${p.products != null && !p.products.isEmpty()}">
                <a th:each="prod : ${p.products}" th:href="@{/product/detail(id=${prod.id})}"
                   class="pcu-chip" th:text="${prod.name}"></a>
            </div>

        </div>
    </div>

</div>

<div th:replace="layout/footer"></div>
</body>
</html>
