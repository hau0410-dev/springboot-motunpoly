<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>MotunPoLy</title>
</head>
<body>


<h1>Chào mừng đến với MotunPoLy</h1>
<p>Website bán phụ tùng xe máy</p>

<!-- ===== DANH MỤC ===== -->
<div class="section">
    <h2>Danh mục nổi bật</h2>

    <div class="category-grid">
        <div class="category-item"
             th:each="c : ${categories}"
             th:text="${c.name}">
            Tên danh mục
        </div>
    </div>
</div>

	


<!-- ===== GỢI Ý CHO BẠN ===== -->
<div class="section">
    <h2>Gợi ý cho bạn</h2>

    <div class="product-grid">
		 <div class="product-card"
		     th:each="p : ${products}">
		
		    <!-- CLICK VÀO ẢNH -->
		    <a th:href="@{/product/detail(id=${p.id})}">
		        <img th:src="@{'/imges/' + ${p.image}}">
		    </a>
		
		    <!-- CLICK VÀO TÊN -->
		    <a th:href="@{/product/detail(id=${p.id})}">
		        <h3 th:text="${p.name}">Tên sản phẩm</h3>
		    </a>
		
		    <p class="price"
		       th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + 'đ'">
		        Giá
		    </p>
		
		    <!-- THÊM VÀO GIỎ -->
		    <form th:action="@{/cart/add/{id}(id=${p.id})}"
		          method="post">
		        <input type="hidden" name="qty" value="1">
		        <button type="submit">Thêm vào giỏ</button>
		    </form>
		   
		
		</div>
    </div>
</div>
<style>/* ===== PHÂN TRANG STYLE SHOPPER ===== */
.pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    margin: 30px 0;
    flex-wrap: wrap;
}

/* link trang */
.pagination a {
    display: inline-block;
    padding: 8px 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    text-decoration: none;
    color: #333;
    background-color: #fff;
    transition: all 0.2s ease;
    font-size: 14px;
}

/* hover */
.pagination a:hover {
    background-color: #222;
    color: #fff;
    border-color: #222;
}

/* trang đang active */
.pagination a.active {
    background-color: #222;
    color: #fff;
    border-color: #222;
    font-weight: 600;
}

/* Prev / Next nổi bật nhẹ */
.pagination a:first-child,
.pagination a:last-child {
    font-weight: 500;
}

/* disable nếu muốn (optional) */
.pagination a[disabled] {
    pointer-events: none;
    opacity: 0.4;
}</style>
 <!-- ===== PHÂN TRANG ===== -->
			<div class="pagination">
			    
			    <!-- PREV -->
			    <a th:if="${currentPage > 0}"
			       th:href="@{/(page=${currentPage - 1})}">
			        Prev
			    </a>
			
			    <!-- PAGE NUMBER -->
			    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
			        <a th:href="@{/(page=${i})}"
			           th:text="${i + 1}"
			           th:classappend="${i == currentPage} ? 'active'">
			        </a>
			    </span>
			
			    <!-- NEXT -->
			    <a th:if="${currentPage < totalPages - 1}"
			       th:href="@{/(page=${currentPage + 1})}">
			        Next
			    </a>
			
			</div>

</body>
</html>
