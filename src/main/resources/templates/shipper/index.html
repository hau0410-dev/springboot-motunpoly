<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Shipper Dashboard - MotunPoly</title>
<link rel="stylesheet" th:href="@{/css/shipper.css}">
</head>
<body>

<div class="sh-topbar">
    <div class="sh-brand">🛵 MotunPoly <span>Shipper</span></div>
    <div class="sh-user">
        <span th:text="'Xin chào, ' + ${shipper.fullName}"></span>
        <a th:href="@{/shipper/history}" class="sh-logout">📋 Lịch sử</a>
        <a th:href="@{/logout}" class="sh-logout">Đăng xuất</a>
    </div>
</div>

<div class="sh-container">

    <!-- ===== ĐƠN CHỜ LẤY HÀNG ===== -->
    <div class="sh-section">
        <h2>📦 Đơn chờ lấy hàng</h2>

        <div th:if="${waitingOrders == null || waitingOrders.isEmpty()}" class="sh-empty">
            Hiện không có đơn nào cần lấy.
        </div>

        <div class="sh-card" th:each="o : ${waitingOrders}">

            <div class="sh-card-head">
                <span class="sh-order-id">#<span th:text="${o.id}"></span></span>
                <span class="sh-badge sh-badge-wait">Chờ lấy hàng</span>
            </div>

            <div class="sh-card-body">
                <p><b th:text="${o.fullname}"></b> &nbsp;|&nbsp; <span th:text="${o.phone}"></span></p>
                <p class="sh-address" th:text="${o.address}"></p>
                <p class="sh-amount" th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></p>
            </div>

            <div class="sh-card-actions">
                <a th:href="@{/shipper/detail/{id}(id=${o.id})}" class="sh-btn sh-btn-outline">Chi tiết</a>
                <a th:href="@{/shipper/pickup/{id}(id=${o.id})}" class="sh-btn sh-btn-primary">🛵 Lấy hàng</a>
            </div>

        </div>

    </div>

    <!-- ===== ĐƠN ĐANG GIAO CỦA TÔI ===== -->
    <div class="sh-section">
        <h2>🚚 Đơn đang giao của tôi</h2>

        <div th:if="${myOrders == null || myOrders.isEmpty()}" class="sh-empty">
            Bạn chưa nhận đơn nào để giao.
        </div>

        <div class="sh-card" th:each="o : ${myOrders}">

            <div class="sh-card-head">
                <span class="sh-order-id">#<span th:text="${o.id}"></span></span>
                <span class="sh-badge sh-badge-going">Đang giao</span>
            </div>

            <div class="sh-card-body">
                <p><b th:text="${o.fullname}"></b> &nbsp;|&nbsp; <span th:text="${o.phone}"></span></p>
                <p class="sh-address" th:text="${o.address}"></p>
                <p class="sh-amount" th:text="${#numbers.formatDecimal(o.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></p>
            </div>

            <div class="sh-card-actions">
                <a th:href="@{/shipper/detail/{id}(id=${o.id})}" class="sh-btn sh-btn-outline">Chi tiết</a>
                <a th:href="@{/shipper/delivered/{id}(id=${o.id})}" class="sh-btn sh-btn-success">✅ Giao thành công</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
