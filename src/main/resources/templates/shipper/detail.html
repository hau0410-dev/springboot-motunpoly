<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Chi tiết đơn hàng - Shipper</title>
<link rel="stylesheet" th:href="@{/css/shipper.css}">
</head>
<body>

<div class="sh-topbar">
    <div class="sh-brand">🛵 MotunPoly <span>Shipper</span></div>
    <div class="sh-user">
        <span th:text="'Xin chào, ' + ${shipper.fullName}"></span>
        <a th:href="@{/shipper/history}" class="sh-logout">📋 Lịch sử</a>
        <a th:href="@{/logout}" class="sh-logout">Đăng xuất</a>
    </div>
</div>

<div class="sh-container">

    <a th:href="@{/shipper/index}" class="sh-back">← Quay lại danh sách</a>

    <div class="sh-section">

        <div class="sh-card-head" style="margin-bottom:14px;">
            <h2 style="margin:0;">🧾 Đơn hàng #<span th:text="${order.id}"></span></h2>

            <span th:if="${order.status == 'CHO_LAY_HANG'}" class="sh-badge sh-badge-wait">Chờ lấy hàng</span>
            <span th:if="${order.status == 'DANG_GIAO'}" class="sh-badge sh-badge-going">Đang giao</span>
            <span th:if="${order.status == 'DA_GIAO'}" class="sh-badge sh-badge-done">Đã giao</span>
        </div>

        <div class="sh-info-grid">
            <div class="sh-info-box">
                <p><span>Khách hàng</span><b th:text="${order.fullname}"></b></p>
                <p><span>SĐT</span><b th:text="${order.phone}"></b></p>
                <p><span>Địa chỉ</span><b th:text="${order.address}"></b></p>
            </div>
            <div class="sh-info-box">
                <p><span>Phương thức TT</span><b th:text="${order.payment != null ? order.payment.paymentMethod : '—'}"></b></p>
                <p><span>Tổng tiền</span><b class="sh-amount" th:text="${#numbers.formatDecimal(order.totalAmount,0,'COMMA',0,'POINT')} + 'đ'"></b></p>
            </div>
        </div>

        <h3>Sản phẩm</h3>

        <div class="sh-products">
            <div class="sh-product-item" th:each="i : ${items}">
                <span th:text="${i.product.name}"></span>
                <span th:text="'x' + ${i.quantity}"></span>
                <span class="sh-amount" th:text="${#numbers.formatDecimal(i.subtotal,0,'COMMA',0,'POINT')} + 'đ'"></span>
            </div>
        </div>

        <div class="sh-card-actions" style="margin-top:20px;">
            <a th:if="${order.status == 'CHO_LAY_HANG'}"
               th:href="@{/shipper/pickup/{id}(id=${order.id})}" class="sh-btn sh-btn-primary">
                🛵 Lấy hàng
            </a>

            <a th:if="${order.status == 'DANG_GIAO'}"
               th:href="@{/shipper/delivered/{id}(id=${order.id})}" class="sh-btn sh-btn-success">
                ✅ Giao thành công
            </a>
        </div>

    </div>

</div>

</body>
</html>
