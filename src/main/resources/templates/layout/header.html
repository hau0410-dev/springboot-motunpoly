<html xmlns:th="http://www.thymeleaf.org">
<header class="mp-header" th:fragment="header">
    <div class="mp-header-top">

        <a th:href="@{/}" class="logo">
            <img th:src="@{/imges/logomotunpoly.png}" alt="MotunPoly">
            <span>MotunPoly</span>
        </a>

        <!-- SEARCH + BỘ LỌC TỔNG QUAN -->
        <div class="search-wrapper">
            <form class="search-box" th:action="@{/}" method="get" id="mainSearchForm">
                <input type="text" name="keyword"
                       placeholder="Tìm phụ tùng xe máy..."
                       th:value="${keyword}">

                <!-- Giữ lại các điều kiện lọc đang chọn khi bấm tìm bằng từ khoá -->
                <input type="hidden" name="category" th:value="${selectedCategory}">
                <input type="hidden" name="min" th:value="${selectedMin}">
                <input type="hidden" name="max" th:value="${selectedMax}">
                <input type="hidden" name="brand" th:value="${selectedBrand}">
                <input type="hidden" name="vehicleType" th:value="${selectedVehicleType}">

                <button type="button" class="filter-toggle-btn" onclick="toggleFilterPanel(event)" title="Bộ lọc tổng quan">
                    ⚙️ Lọc
                </button>
                <button type="submit">🔍</button>
            </form>

            <!-- PANEL LỌC TỔNG QUAN -->
            <div class="filter-panel" id="filterPanel">

                <div class="filter-panel-row">
                    <label>Danh mục</label>
                    <select name="fp-category" id="fp-category">
                        <option value="">-- Tất cả danh mục --</option>
                        <option th:each="c : ${categories}"
                                th:value="${c.id}"
                                th:text="${c.name}"
                                th:selected="${selectedCategory != null and selectedCategory == c.id}"></option>
                    </select>
                </div>

                <div class="filter-panel-row">
                    <label>Loại xe</label>
                    <select name="fp-vehicleType" id="fp-vehicleType">
                        <option value="">-- Tất cả loại xe --</option>
                        <option value="Xe tay ga" th:selected="${selectedVehicleType == 'Xe tay ga'}">🛵 Xe tay ga</option>
                        <option value="Xe số" th:selected="${selectedVehicleType == 'Xe số'}">🏍️ Xe số</option>
                        <option value="Xe côn tay" th:selected="${selectedVehicleType == 'Xe côn tay'}">🔥 Xe côn tay</option>
                        <option value="Xe phân khối lớn" th:selected="${selectedVehicleType == 'Xe phân khối lớn'}">🏁 Xe phân khối lớn</option>
                    </select>
                </div>

                <div class="filter-panel-row">
                    <label>Hãng xe</label>
                    <select name="fp-brand" id="fp-brand">
                        <option value="">-- Tất cả hãng --</option>
                        <option value="Honda" th:selected="${selectedBrand == 'Honda'}">Honda</option>
                        <option value="Yamaha" th:selected="${selectedBrand == 'Yamaha'}">Yamaha</option>
                        <option value="Suzuki" th:selected="${selectedBrand == 'Suzuki'}">Suzuki</option>
                        <option value="Kawasaki" th:selected="${selectedBrand == 'Kawasaki'}">Kawasaki</option>
                        <option value="SYM" th:selected="${selectedBrand == 'SYM'}">SYM</option>
                        <option value="Piaggio" th:selected="${selectedBrand == 'Piaggio'}">Piaggio</option>
                        <option value="Đa hãng" th:selected="${selectedBrand == 'Đa hãng'}">Đa hãng</option>
                    </select>
                </div>

                <div class="filter-panel-row">
                    <label>Khoảng giá</label>
                    <div class="filter-price-presets">
                        <button type="button" onclick="setPriceRange(0,500000)">Dưới 500k</button>
                        <button type="button" onclick="setPriceRange(500000,1000000)">500k - 1tr</button>
                        <button type="button" onclick="setPriceRange(1000000,3000000)">1tr - 3tr</button>
                        <button type="button" onclick="setPriceRange(3000000,null)">Trên 3tr</button>
                    </div>
                    <div class="filter-price-inputs">
                        <input type="number" id="fp-min" placeholder="Từ (đ)" th:value="${selectedMin}">
                        <span>—</span>
                        <input type="number" id="fp-max" placeholder="Đến (đ)" th:value="${selectedMax}">
                    </div>
                </div>

                <div class="filter-panel-actions">
                    <a href="/" class="filter-reset-btn">↺ Xoá lọc</a>
                    <button type="button" class="filter-apply-btn" onclick="applyFilterPanel()">✅ Áp dụng</button>
                </div>
            </div>
        </div>

        <!-- CART -->
        <a th:href="@{/cart}" class="cart">
            🛒 <span class="cart-text">Giỏ hàng</span>
            <span th:if="${session.cart != null && !#lists.isEmpty(session.cart.items)}"
                  class="cart-badge"
                  th:text="${#lists.size(session.cart.items)}"></span>
        </a>

        <!-- AUTH -->
        <div class="auth-buttons">
            <div th:if="${session.user == null}" style="display:flex;gap:10px;">
                <a th:href="@{/login}" class="btn-auth">Đăng nhập</a>
                <a th:href="@{/register}" class="btn-auth btn-register">Đăng ký</a>
            </div>

            <div th:if="${session.user != null}" class="user-menu">
                <button class="user-menu-toggle" type="button">
                    <span>👤</span>
                    <span th:text="${session.user.fullName ?: session.user.username}">User</span>
                    <span class="menu-arrow">▾</span>
                </button>
                <div class="user-dropdown">
                  <div class="user-dropdown-inner">
                    <a th:href="@{/profile}">👤 Thông tin cá nhân</a>
                    <a th:href="@{/orders}">📦 Lịch sử đặt hàng</a>
                    <a th:href="@{/returns}">↩️ Đơn hoàn trả</a>
                    <a th:href="@{/reviews}">⭐ Lịch sử đánh giá</a>
                    <a th:href="@{/promotions}">🎁 Ưu đãi của tôi</a>
                    <a th:href="@{/change-password}">🔒 Đổi mật khẩu</a>
                    <a th:if="${session.user.role == 'ADMIN'}" th:href="@{/admin}" class="dd-admin">⚙️ Quản trị</a>
                    <a th:href="@{/logout}" class="dd-logout">🚪 Đăng xuất</a>
                  </div>
                </div>
            </div>
        </div>

    </div>
</header>

<script>
    function toggleFilterPanel(e) {
        e.preventDefault();
        e.stopPropagation();
        const panel = document.getElementById('filterPanel');
        panel.classList.toggle('show');
    }

    function setPriceRange(min, max) {
        document.getElementById('fp-min').value = min;
        document.getElementById('fp-max').value = (max === null) ? '' : max;
    }

    function applyFilterPanel() {
        const params = new URLSearchParams(window.location.search);

        const keywordInput = document.querySelector('#mainSearchForm input[name="keyword"]');
        const keyword = keywordInput ? keywordInput.value : '';

        const category = document.getElementById('fp-category').value;
        const vehicleType = document.getElementById('fp-vehicleType').value;
        const brand = document.getElementById('fp-brand').value;
        const min = document.getElementById('fp-min').value;
        const max = document.getElementById('fp-max').value;

        const url = new URL('/', window.location.origin);

        if (keyword) url.searchParams.set('keyword', keyword);
        if (category) url.searchParams.set('category', category);
        if (vehicleType) url.searchParams.set('vehicleType', vehicleType);
        if (brand) url.searchParams.set('brand', brand);
        if (min) url.searchParams.set('min', min);
        if (max) url.searchParams.set('max', max);

        window.location.href = url.toString();
    }

    // Đóng panel khi bấm ra ngoài
    document.addEventListener('click', function (e) {
        const panel = document.getElementById('filterPanel');
        const toggleBtn = document.querySelector('.filter-toggle-btn');
        if (!panel) return;
        if (!panel.contains(e.target) && e.target !== toggleBtn) {
            panel.classList.remove('show');
        }
    });
</script>
