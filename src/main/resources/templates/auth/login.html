<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-page">
    <form action="/login" method="post" class="login-box">

        <a th:href="@{/}" class="auth-brand">
            <img th:src="@{/imges/logomotunpoly.png}" alt="MotunPoly">
            <span>MotunPoly</span>
        </a>

        <h2>Đăng nhập</h2>
        <p class="auth-subtitle">Chào mừng bạn trở lại 👋</p>

        <p class="alert success" th:if="${success}" th:text="${success}"></p>
        <p class="alert error" th:if="${error}" th:text="${error}"></p>

        <div class="input-box">
            <span>👤</span>
            <input name="username" placeholder="Tên đăng nhập">
        </div>

        <div class="input-box">
            <span>🔒</span>
            <input type="password" name="password" placeholder="Mật khẩu" id="loginPassword">
            <span class="toggle-eye" onclick="togglePassword('loginPassword', this)">👁️</span>
        </div>

        <button type="submit">Đăng nhập</button>

        <div class="auth-links">
            <a href="/forgot" class="forgot-link">Quên mật khẩu?</a>
            <a href="/register" class="register-link">Tạo tài khoản mới</a>
        </div>

    </form>
</div>

<script>
function togglePassword(id, el){
    var input = document.getElementById(id);
    if(input.type === "password"){
        input.type = "text";
        el.textContent = "🙈";
    } else {
        input.type = "password";
        el.textContent = "👁️";
    }
}
</script>

</body>
</html>
