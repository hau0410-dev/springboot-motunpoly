<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đổi mật khẩu — MotunPoly</title>
<link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="auth-page">

    <div class="auth-hero">
        <div class="auth-hero-content">
            <div class="auth-hero-brand">
                <img th:src="@{/imges/logomotunpoly.png}" alt="MotunPoly">
                MotunPoly
            </div>
            <p class="auth-hero-tagline">Bảo vệ tài khoản của bạn bằng mật khẩu mạnh và không chia sẻ với ai.</p>
        </div>
    </div>

    <div class="auth-panel">
        <h2 class="auth-panel-title">Đổi mật khẩu</h2>
        <p class="auth-panel-sub">Cập nhật mật khẩu để bảo vệ tài khoản</p>

        <p class="alert error"   th:if="${error}"   th:text="${error}"></p>
        <p class="alert success" th:if="${success}" th:text="${success}"></p>

        <form th:action="@{/change-password}" method="post">

            <div class="input-group">
                <label>Mật khẩu hiện tại</label>
                <div class="input-box">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="oldPassword" id="oldPw" placeholder="••••••••" required>
                    <span class="toggle-eye" onclick="togglePw('oldPw',this)">👁️</span>
                </div>
            </div>

            <div class="input-group">
                <label>Mật khẩu mới</label>
                <div class="input-box">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="newPassword" id="newPw" placeholder="••••••••" required>
                    <span class="toggle-eye" onclick="togglePw('newPw',this)">👁️</span>
                </div>
            </div>

            <button type="submit" class="auth-btn">Cập nhật mật khẩu →</button>

        </form>

        <a th:href="@{/profile}" class="auth-back">← Quay lại thông tin cá nhân</a>
    </div>
</div>

<script>
function togglePw(id, el) {
    var input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    el.textContent = input.type === 'password' ? '👁️' : '🙈';
}
</script>
</body>
</html>
