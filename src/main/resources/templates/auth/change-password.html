<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đổi mật khẩu</title>

<link rel="stylesheet" th:href="@{/css/change-password.css}">

</head>
<body>

<div class="cp-page">

    <div class="cp-box">

        <div class="cp-icon">🔒</div>

        <h2>Đổi mật khẩu</h2>
        <p class="cp-subtitle">Cập nhật mật khẩu để bảo vệ tài khoản của bạn</p>

        <form th:action="@{/change-password}" method="post">

            <label>Mật khẩu cũ</label>
            <input type="password" name="oldPassword" placeholder="Nhập mật khẩu hiện tại" required>

            <label>Mật khẩu mới</label>
            <input type="password" name="newPassword" placeholder="Nhập mật khẩu mới" required>

            <button type="submit">
                Đổi mật khẩu
            </button>

        </form>

        <p class="error" th:text="${error}"></p>
        <p class="success" th:text="${success}"></p>

        <a th:href="@{/profile}" class="back">
            ← Quay lại thông tin cá nhân
        </a>

    </div>

</div>

</body>
</html>
