<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div class="login-page">
    <form th:action="@{/register}" method="post" class="login-box" onsubmit="return checkPasswords()">

        <a th:href="@{/}" class="auth-brand">
            <img th:src="@{/imges/logo.png}" alt="MotunPoly">
            <span>MotunPoly</span>
        </a>

        <h2>Tạo tài khoản</h2>
        <p class="auth-subtitle">Đăng ký để mua sắm và nhận ưu đãi 🎁</p>

        <p class="alert success" th:if="${success}" th:text="${success}"></p>
        <p class="alert error" th:if="${error}" th:text="${error}"></p>
        <p class="alert error" id="pwMismatch" style="display:none">Mật khẩu nhập lại không khớp!</p>

        <div class="input-box">
            <span>👤</span>
            <input name="username" placeholder="Tên đăng nhập" required>
        </div>

        <div class="input-box">
            <span>📧</span>
            <input type="email" name="email" placeholder="Email" required>
        </div>

        <div class="input-box">
            <span>🔒</span>
            <input type="password" name="password" id="regPassword" placeholder="Mật khẩu" required>
            <span class="toggle-eye" onclick="togglePassword('regPassword', this)">👁️</span>
        </div>

        <div class="input-box">
            <span>🔒</span>
            <input type="password" id="regConfirm" placeholder="Nhập lại mật khẩu" required>
            <span class="toggle-eye" onclick="togglePassword('regConfirm', this)">👁️</span>
        </div>

        <button type="submit">Đăng ký</button>

        <div class="auth-links">
            <a th:href="@{/login}" class="register-link">Đã có tài khoản? Đăng nhập</a>
        </div>

    </form>
</div>

<script>
function togglePassword(id, el){
    var input = document.getElementById(id);
    if(input.type === "password"){
        input.type = "text";
        el.textContent = "🙈";
    } else {
        input.type = "password";
        el.textContent = "👁️";
    }
}

function checkPasswords(){
    var pw = document.getElementById('regPassword').value;
    var confirm = document.getElementById('regConfirm').value;
    var warning = document.getElementById('pwMismatch');

    if(pw !== confirm){
        warning.style.display = "block";
        return false;
    }

    warning.style.display = "none";
    return true;
}
</script>

</body>
</html>
