<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký — MotunPoly</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="auth-page">

    <div class="auth-hero">
        <div class="auth-hero-content">
            <div class="auth-hero-brand">
                <img th:src="@{/imges/logomotunpoly.png}" alt="MotunPoly">
                MotunPoly
            </div>
            <p class="auth-hero-tagline">Tạo tài khoản để mua sắm nhanh hơn, nhận ưu đãi riêng và theo dõi đơn hàng dễ dàng.</p>
        </div>
    </div>

    <div class="auth-panel">
        <h2 class="auth-panel-title">Tạo tài khoản</h2>
        <p class="auth-panel-sub">Đăng ký miễn phí — chỉ mất 30 giây</p>

        <p class="alert success" th:if="${success}" th:text="${success}"></p>
        <p class="alert error"   th:if="${error}"   th:text="${error}"></p>
        <p class="alert error" id="pwMismatch" style="display:none;">Mật khẩu nhập lại không khớp!</p>

        <form th:action="@{/register}" method="post" onsubmit="return checkPasswords()">

            <div class="input-group">
                <label>Tên đăng nhập</label>
                <div class="input-box">
                    <span class="input-icon">👤</span>
                    <input name="username" placeholder="username" required>
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <div class="input-box">
                    <span class="input-icon">📧</span>
                    <input type="email" name="email" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="input-group">
                <label>Mật khẩu</label>
                <div class="input-box">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" id="regPw" placeholder="Tối thiểu 6 ký tự" required>
                    <span class="toggle-eye" onclick="togglePw('regPw',this)">👁️</span>
                </div>
            </div>

            <div class="input-group">
                <label>Nhập lại mật khẩu</label>
                <div class="input-box">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="regConfirm" placeholder="••••••••" required>
                    <span class="toggle-eye" onclick="togglePw('regConfirm',this)">👁️</span>
                </div>
            </div>

            <button type="submit" class="auth-btn">Đăng ký →</button>

        </form>

        <div class="auth-links">
            <a th:href="@{/login}" class="auth-link">Đã có tài khoản? <b>Đăng nhập</b></a>
        </div>
    </div>
</div>

<script>
function togglePw(id, el) {
    var input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    el.textContent = input.type === 'password' ? '👁️' : '🙈';
}

function checkPasswords() {
    var pw = document.getElementById('regPw').value;
    var cf = document.getElementById('regConfirm').value;
    var msg = document.getElementById('pwMismatch');
    if (pw !== cf) { msg.style.display='block'; return false; }
    msg.style.display='none'; return true;
}
</script>
</body>
</html>
